name: Nix Scraper

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch NixOS package.nix
        run: |
          curl -sL https://raw.githubusercontent.com/NixOS/nixpkgs/master/pkgs/by-name/da/davinci-resolve/package.nix -o package.nix

      - name: Parse variables
        id: parse
        run: |
          VERSION=$(grep -oP 'version = "\K[^"]+' package.nix || echo "")
          REFERID=$(grep -oP 'REFERID = "\K[^"]+' package.nix || echo "")
          
          if [[ -z "$VERSION" || -z "$REFERID" ]]; then
            echo "Failed to parse VERSION or REFERID from package.nix."
            exit 1
          fi
          
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "referid=$REFERID" >> $GITHUB_OUTPUT

      - name: Update template and install script
        run: |
          VERSION="${{ steps.parse.outputs.version }}"
          REFERID="${{ steps.parse.outputs.referid }}"
          
          # Update template
          sed -i "s/^version=.*/version=$VERSION/" template
          
          # Update install-davinci.sh
          sed -i 's/^VERSION=".*/VERSION="'"$VERSION"'"/' files/install-davinci.sh
          sed -i 's/^REFERID=".*/REFERID="'"$REFERID"'"/' files/install-davinci.sh

      - name: Commit changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add template files/install-davinci.sh
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: auto-update to NixOS version ${{ steps.parse.outputs.version }}" && git push)
